x-proxy-settings: &proxy-settings
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: "localhost,127.0.0.1,mongo,web,.aiiinotate_network"

services:
  mongo:
    image: mongo:8
    restart: always
    networks:
      - aiiinotate_network
    volumes:
      - mongodata:/data/db
    environment:
      <<: *proxy-settings
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  aiiinotate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PORT: ${AIIINOTATE_PORT}
        ENV_PATH: ../docker/.env
    # NOTE: be careful to point to docker/.env, not to config/.env, otherwise you will have very, very annoying errors.
    env_file:
      - ../docker/.env
    ports:
      - "${AIIINOTATE_PORT}:${AIIINOTATE_PORT}"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - aiiinotate_network
    environment:
      <<: *proxy-settings
    restart: always


volumes:
  mongodata:

networks:
  aiiinotate_network:
    driver: bridge